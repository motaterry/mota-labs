# Use this workflow when the Git repository root is the `stitch` folder (this workspace),
# not `mota-labs-web` alone. It builds mota-labs-web/ and deploys its out/ to GitHub Pages.

name: Deploy Mota Labs (GitHub Pages)

on:
  push:
    branches: [main, master]
    paths:
      - "mota-labs-web/**"
      - ".github/workflows/deploy-mota-labs-web.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages-mota-labs-web
  cancel-in-progress: true

defaults:
  run:
    working-directory: mota-labs-web

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: mota-labs-web/package-lock.json

      - name: Set BASE_PATH for GitHub Pages
        id: base
        run: |
          OWNER='${{ github.repository_owner }}'
          REPO='${{ github.event.repository.name }}'
          if [ "$REPO" = "$OWNER.github.io" ]; then
            echo "path=" >> "$GITHUB_OUTPUT"
          else
            echo "path=/$REPO" >> "$GITHUB_OUTPUT"
          fi

      - name: Install and build
        env:
          BASE_PATH: ${{ steps.base.outputs.path }}
        run: |
          npm ci
          npm run build

      - uses: actions/upload-pages-artifact@v3
        with:
          path: mota-labs-web/out

      - id: deployment
        uses: actions/deploy-pages@v4
